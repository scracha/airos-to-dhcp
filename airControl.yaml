openapi: 3.0.0
info:
  title: airControl REST API
  termsOfService: ""
  version: 1.0.0
servers:
- url: /api/v1
paths:
  /configuration/{configurationId}/content:
    get:
      tags:
      - configuration
      summary: Returns specified configuration content.
      operationId: getConfigurationData
      parameters:
      - name: configurationId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/*: {}
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to retrieve configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device/configuration not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /configuration/info:
    post:
      tags:
      - configuration
      summary: Returns list of configuration details.
      operationId: getConfigurationBackupList
      requestBody:
        description: List of configuration ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationBackupData'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to retrieve configurations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /configuration/info/devices:
    post:
      tags:
      - configuration
      summary: Returns list of configuration details for specified devices.
      operationId: getDevicesConfigurationBackupList
      requestBody:
        description: List of device ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationBackupData'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to retrieve configurations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /configuration/delete:
    post:
      tags:
      - configuration
      summary: Deletes specified configurations.
      operationId: deleteConfigurationBackupList
      requestBody:
        description: List of configuration ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation. Returns list of deleted configuration
            ids.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to delete configurations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/mac/{mac}:
    get:
      tags:
      - devices
      summary: Returns device with specified mac address.
      operationId: getDevice
      parameters:
      - name: mac
        in: path
        required: true
        schema:
          type: string
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceData'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for this device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}:
    get:
      tags:
      - devices
      summary: Returns specified device.
      operationId: getDevice
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for this device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices:
    get:
      tags:
      - devices
      summary: Returns list of devices managed by current user.
      operationId: getDeviceList
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceList'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/metrics:
    post:
      tags:
      - devices
      summary: Returns specified device metrics.
      operationId: getDeviceMetrics
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbstractMetricRequest'
        required: true
      responses:
        200:
          description: Successful operation.
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for this device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/alerts:
    get:
      tags:
      - devices
      summary: Returns all device specific alerts.
      operationId: getDeviceAlerts
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsListData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    delete:
      tags:
      - devices
      summary: Deletes all device specific alerts.
      operationId: deleteDeviceAlerts
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        204:
          description: Successful operation.
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/events:
    get:
      tags:
      - devices
      summary: Returns device specific events for specified time interval.
      operationId: getDeviceEvents
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: time
        in: query
        schema:
          type: string
          enum:
          - hour
          - today
          - week
          - month
          - all
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsListData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/location/custom:
    get:
      tags:
      - devices
      summary: Returns device custom location.
      operationId: getDeviceCustomLocation
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coordinates'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    post:
      tags:
      - devices
      summary: Sets new device custom coordinates.
      operationId: setDeviceCustomLocation
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        description: Custom device coordinates.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Coordinates'
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coordinates'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    delete:
      tags:
      - devices
      summary: Removes device custom coordinates.
      operationId: deleteDeviceCustomLocation
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        204:
          description: Successful operation.
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/location/gps:
    get:
      tags:
      - devices
      summary: Returns device gps location.
      operationId: getDeviceGPSLocation
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coordinates'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/credentials/clear:
    patch:
      tags:
      - devices
      summary: Removes access credentials for all devices.
      operationId: clearDeviceAccessCredentials
      responses:
        204:
          description: Successful operation.
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/webui:
    post:
      tags:
      - devices
      summary: Returns list of device urls that can be used to open devices Web UI.
      operationId: openWebUi
      requestBody:
        description: List of device ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceUrlsData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for one of the devices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/{deviceId}/config:
    get:
      tags:
      - devices
      summary: Returns device latest configuration backup file.
      operationId: getDeviceConfig
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        200:
          description: Successful operation.
          content:
            application/*: {}
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for specified device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device/configuration not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/meta-info:
    get:
      tags:
      - devices
      summary: Returns info about device properties structure.
      operationId: getMetaProperties
      responses:
        200:
          description: Successful operation.
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/export:
    post:
      summary: Export personal data according to GDPR.
      operationId: exportPersonalData
      requestBody:
        description: list of device ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            text/plain: {}
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for the list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/update-unms-status:
    post:
      summary: Updates UNMS status field.
      operationId: updateUnmsStatus
      requestBody:
        description: list of device ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            text/plain: {}
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for the list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /devices/basic-properties:
    post:
      tags:
      - devices
      summary: Returns devices basic properties that can be updated.
      operationId: getProperties
      requestBody:
        description: list of device ids.
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceUpdateData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for the list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    patch:
      tags:
      - devices
      summary: Update devices basic properties.
      operationId: setProperties
      requestBody:
        description: list of devices basic properties to update.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DeviceUpdateData'
        required: true
      responses:
        204:
          description: Successful operation.
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute the action for this device list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /login:
    post:
      tags:
      - authorization
      summary: Logs into airControl instance
      operationId: login
      requestBody:
        description: A JSON object containing the login and password.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthInfo'
        required: true
      responses:
        200:
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserData'
        401:
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /logout:
    post:
      tags:
      - authorization
      summary: Logs out current user
      operationId: logout
      responses:
        200:
          description: User logged out successfully
  /metric-sets:
    get:
      tags:
      - metrics
      summary: Returns all available metric sets.
      operationId: getMetricSets
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldSetList'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    post:
      tags:
      - metrics
      summary: Creates new metric set. To create new metric set at least one field
        must be specified. Field is identified by 'fieldKind' and 'iface' properties
        combination. 'iface' property can be null. For available values check '/metric-sets/meta'
        end point
      operationId: addMetricSet
      requestBody:
        description: New metric set object.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldSetData'
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldSetData'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /metric-sets/{metricSetId}:
    delete:
      tags:
      - metrics
      summary: Deletes specified metric set.
      operationId: deleteMetricSet
      parameters:
      - name: metricSetId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        204:
          description: Successful operation.
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Metric set not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
    patch:
      tags:
      - metrics
      summary: Updates specified metric set.
      operationId: updateMetricSet
      parameters:
      - name: metricSetId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        description: Metric set object properties that needs to be updated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldSetData'
        required: true
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldSetData'
        400:
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        403:
          description: User not authorized to execute this action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
        404:
          description: Metric set not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /metric-sets/meta:
    get:
      tags:
      - metrics
      summary: Returns metric set 'construction blocks' like available fields, colors,
        interfaces.
      operationId: getMetricSetsMetaData
      responses:
        200:
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricSetMetaData'
        401:
          description: User not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestValidationError'
  /rules:
    get:
      tags:
      - rules
      summary: Returns list of rules.
      operationId: getRules
      responses:
        200:
          description: Successful operation.
