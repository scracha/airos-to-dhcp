components:
  schemas:
    MetricSetMetaData:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TaggedFieldMetaData'
        colors:
          type: array
          items:
            $ref: '#/components/schemas/Color'
        ifaces:
          type: array
          items:
            $ref: '#/components/schemas/IFaceMetaData'
    EventsData:
      type: object
      properties:
        type:
          type: string
        deviceId:
          type: integer
          format: int32
        time:
          type: string
          format: date-time
        parameters:
          type: object
          additionalProperties:
            type: object
    FieldSetData:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
    IFaceMetaData:
      type: object
      properties:
        iface:
          type: string
        name:
          type: string
    AbstractTask:
      type: object
      properties:
        id:
          type: integer
          format: int32
        parentId:
          type: integer
          format: int32
        taskName:
          type: string
        status:
          type: integer
          format: int32
        result:
          type: integer
          format: int32
        progress:
          type: integer
          format: int32
        taskMessage:
          $ref: '#/components/schemas/Message'
        cause:
          type: integer
          format: int32
        startTime:
          type: integer
          format: int32
        finishTime:
          type: integer
          format: int32
        startedByUser:
          type: string
        startedByUserId:
          type: integer
          format: int32
        canceledByUser:
          type: string
        uiToken:
          type: integer
          format: int32
        starterSessionId:
          type: integer
          format: int32
        cancelRequested:
          type: boolean
        flags:
          type: integer
          format: int32
        ruleId:
          type: integer
          format: int32
        ruleName:
          type: string
        schedulingType:
          type: integer
          format: int32
        scheduledStartTime:
          type: integer
          format: int32
        scheduledEndTime:
          type: integer
          format: int32
        schedulingPeriod:
          type: integer
          format: int32
        schedulingPeriodUnit:
          type: integer
          format: int32
        lastSchedulingTime:
          type: integer
          format: int32
        execCount:
          type: integer
          format: int32
        scheduledByUser:
          type: string
    PropertyData:
      type: object
      properties:
        name:
          type: string
        values:
          type: object
        interfaces:
          type: object
          additionalProperties:
            type: string
        type:
          type: object
          additionalProperties:
            type: object
        periods:
          type: array
          items:
            type: string
        units:
          type: array
          items:
            type: string
    Message:
      type: object
      properties:
        messageCode:
          type: string
        parameters:
          type: array
          items:
            type: object
    UserData:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        password:
          type: string
        currentPassword:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        sessionTimeout:
          type: integer
          format: int32
        role:
          $ref: '#/components/schemas/RoleData'
        isNew:
          type: boolean
        webProperties:
          type: string
        hasDefaultPassword:
          type: boolean
    RequestValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/MessageDetails'
    TriggeredTask:
      type: object
      properties:
        startDelay:
          type: integer
          format: int32
        taskTemplateId:
          type: integer
          format: int32
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateField'
    ServerAddress:
      type: object
      properties:
        ip:
          type: string
        port:
          type: integer
          format: int32
    HardwareItemData:
      type: object
      properties:
        permissions:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/Status'
        type:
          type: string
        parentId:
          type: integer
          format: int32
        location:
          $ref: '#/components/schemas/Location'
        summary:
          $ref: '#/components/schemas/Summary'
        lastHeartbeat:
          type: string
          format: date-time
        deviceId:
          type: integer
          format: int32
        firmwareVersion:
          $ref: '#/components/schemas/FirmwareInfo'
        latestVersion:
          $ref: '#/components/schemas/FirmwareInfo'
        isLatestVersion:
          type: boolean
        isConfigurationSupported:
          type: boolean
        properties:
          type: object
          additionalProperties:
            type: object
    RoleData:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        permissions:
          uniqueItems: true
          type: array
          items:
            type: string
            enum:
            - MANAGE_SERVER
            - MANAGE_USERS
            - MANAGE_DEVICES
            - MONITOR_DEVICES
            - MONITOR
            - CONTROL
    Field:
      type: object
      properties:
        name:
          type: string
        fieldKind:
          type: integer
          format: int32
        iface:
          type: string
        units:
          type: string
        color:
          $ref: '#/components/schemas/Color'
    EventsListData:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/EventsData'
        count:
          type: integer
          format: int32
    FieldSetList:
      type: object
      properties:
        count:
          type: integer
          format: int32
        results:
          type: array
          items:
            $ref: '#/components/schemas/FieldSetData'
    DeviceData:
